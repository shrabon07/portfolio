<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopFast - Product Details</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="product.css">
</head>
<body>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Header -->
  <header class="product-header">
    <div class="product-header-inner">
      <a href="index.html" class="logo">
        <svg class="logo-icon" viewBox="0 0 40 40" width="40" height="40">
          <defs><linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#FF6B6B"/><stop offset="50%" style="stop-color:#A855F7"/><stop offset="100%" style="stop-color:#4ECDC4"/></linearGradient></defs>
          <rect x="4" y="10" width="32" height="24" rx="4" fill="url(#logoGrad)"/>
          <path d="M12 16V12a8 8 0 0 1 16 0v4" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>
          <circle cx="20" cy="26" r="3" fill="#FFE66D"/>
        </svg>
        <span>ShopFast</span>
      </a>
      <div style="display:flex;align-items:center;gap:16px">
        <a href="index.html" class="back-home">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back to Shop
        </a>
        <button class="cart-btn" id="cartBtn" aria-label="Open cart" style="position:relative;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--card-bg);border:1px solid var(--card-border);color:var(--text);cursor:pointer">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span class="cart-count" id="cartCount" style="position:absolute;top:-2px;right:-2px;width:22px;height:22px;background:linear-gradient(135deg,#FF6B6B,#A855F7);color:#fff;font-size:11px;font-weight:700;border-radius:50%;display:flex;align-items:center;justify-content:center">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Loading State -->
  <div class="product-loading" id="productLoading">
    <div class="loader"></div>
    <p>Loading product...</p>
  </div>

  <!-- Product Detail -->
  <div class="product-detail" id="productDetail" style="display:none">
    <div class="product-detail-image" id="productImage"></div>
    <div class="product-detail-info">
      <span class="product-detail-category" id="productCategory"></span>
      <h1 class="product-detail-name" id="productName"></h1>
      <div class="product-detail-rating" id="productRating"></div>
      <div class="product-detail-price" id="productPrice"></div>
      <p class="product-detail-desc" id="productDesc"></p>
      <div class="product-detail-actions">
        <button class="btn-add-cart" id="addToCartBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          Add to Cart
        </button>
        <a href="index.html" class="btn-back-shop">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Continue Shopping
        </a>
      </div>
      <div class="product-specs" id="productSpecs"></div>
    </div>
  </div>

  <!-- Related Products -->
  <div class="related-section" id="relatedSection" style="display:none">
    <h2 class="related-title">You May Also Like</h2>
    <div class="related-grid" id="relatedGrid"></div>
  </div>

  <!-- Cart Panel (shared) -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button class="cart-close" id="cartClose" aria-label="Close cart">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="cart-items" id="cartItems">
      <div class="cart-empty">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <p>Your cart is empty</p>
        <span>Add some products to get started!</span>
      </div>
    </div>
    <div class="cart-footer" id="cartFooter" style="display:none">
      <div class="cart-total"><span>Total</span><span class="total-price" id="cartTotal">$0.00</span></div>
      <button class="checkout-btn">Checkout</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
  <script src="product.js"></script>
</body>
</html>
